<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banking Mains</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
    -webkit-tap-highlight-color: transparent; /* Smooth touch for mobile */
}

body{
    background:#0f172a;
    color:white;
    padding:15px;
    min-height:100vh;
}

/* HEADER */
.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    font-size:30px;
    background:linear-gradient(90deg,#60a5fa,#8b5cf6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.header p{
    color:#94a3b8;
    margin-top:8px;
    font-size:14px;
}

/* FOLDER GRID - Highly Mobile Friendly */
.folder-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
}

/* FOLDER CARD */
.folder-card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;
    overflow:hidden;
    transition: 0.25s ease;
    backdrop-filter:blur(8px);
    height: max-content; /* Prevents grid stretching layout issues */
}

.folder-card:hover{
    border-color:#6366f1;
}

/* FOLDER HEADER */
.folder-header{
    padding:14px;
    cursor:pointer;
    user-select: none;
}

.folder-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 8px;
}

.folder-name{
    font-size:14px;
    font-weight:bold;
    line-height:1.3;
    word-break:break-word;
}

.folder-count{
    background:#6366f1;
    color: white;
    padding:3px 8px;
    border-radius:12px;
    font-size:11px;
    flex-shrink:0;
}

/* FILES LIST */
.file-list{
    max-height:0;
    overflow:hidden;
    transition: max-height 0.35s ease-out;
    background: rgba(0, 0, 0, 0.2);
}

.file-list.active{
    max-height: 1000px; /* Sensible limit for smooth animation */
}

/* FILE ITEM */
.file-item{
    padding:12px 14px;
    border-top:1px solid rgba(255,255,255,0.06);
    cursor:pointer;
    transition: 0.2s;
}

.file-item:hover{
    background:rgba(99,102,241,0.2);
}

.file-title{
    font-size:13px;
    line-height:1.4;
    color: #cbd5e1;
}

/* LOADER */
.loader-overlay{
    position:fixed;
    inset:0;
    background:#0f172a;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:99999;
    transition: opacity 0.25s ease;
}

.loader-overlay.hide{
    opacity:0;
    pointer-events:none;
}

.loader{
    width:55px;
    height:55px;
    border:6px solid rgba(255,255,255,0.1);
    border-top:6px solid #6366f1;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
}

@keyframes spin{
    100%{ transform:rotate(360deg); }
}

.empty{
    text-align:center;
    color:#94a3b8;
    margin-top:50px;
    font-size:16px;
    grid-column: 1 / -1;
}

/* MOBILE OPTIMIZATIONS */
@media(max-width:400px){
    .folder-grid{
        grid-template-columns: repeat(2, 1fr); /* 2 Columns on tiny phones */
        gap: 8px;
    }
    .folder-name {
        font-size: 13px;
    }
    body {
        padding: 10px;
    }
}
</style>
</head>
<body>

<!-- LOADER -->
<div class="loader-overlay" id="loader">
    <div class="loader"></div>
</div>

<!-- HEADER -->
<div class="header">
    <h1>Banking Mains</h1>
    <p>Practice Sets Collection</p>
</div>

<!-- FOLDERS -->
<div class="folder-grid" id="folderGrid"></div>

<script>
/*
====================================================
ADD YOUR DETAILS
====================================================
*/
const username = "officialappaarav-spec";
const repo = "folders-test";

/*
====================================================
LOADER CONTROLLER (FIXES BACK-BUTTON FREEZE)
====================================================
*/
function hideLoader() {
    document.getElementById("loader").classList.add("hide");
}

function showLoader() {
    document.getElementById("loader").classList.remove("hide");
}

// Handles initial load
window.addEventListener("load", () => {
    setTimeout(hideLoader, 400);
});

// Handles browser back button cache restore (Critical for iOS Safari/Chrome Mobile)
window.addEventListener("pageshow", (event) => {
    if (event.persisted) {
        hideLoader();
    }
});

/*
====================================================
TEXT UTILITIES
====================================================
*/
function getCategory(fileName){
    return fileName.replace(/\s\d+\.html$/i,"").trim();
}

function getNumber(fileName){
    const match = fileName.match(/(\d+)(?=\.html)/i);
    return match ? parseInt(match[1]) : 0;
}

/*
====================================================
LOAD DATA FROM GITHUB
====================================================
*/
async function loadFiles(){
    try{
        const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
        if(!response.ok) throw new Error("Network error");
        
        const data = await response.json();
        const files = data
            .filter(file => file.name.endsWith(".html") && file.name.toLowerCase() !== "index.html")
            .map(file => file.name);

        createFolders(files);
    }catch(error){
        console.error(error);
        document.getElementById("folderGrid").innerHTML = `
            <div class="empty">Failed To Load Files. Check Repository settings.</div>
        `;
    }
}

/*
====================================================
PROCESS FOLDERS
====================================================
*/
function createFolders(files){
    const folders = {};

    files.forEach(file => {
        const category = getCategory(file);
        if(!folders[category]) folders[category] = [];
        folders[category].push(file);
    });

    // Sort Descending (Highest numbers first)
    Object.keys(folders).forEach(category => {
        folders[category].sort((a,b) => getNumber(b) - getNumber(a));
    });

    renderFolders(folders);
}

/*
====================================================
RENDER MARKUP
====================================================
*/
function renderFolders(folders){
    const folderGrid = document.getElementById("folderGrid");
    folderGrid.innerHTML = "";

    Object.keys(folders).forEach((category, index) => {
        const folder = document.createElement("div");
        folder.className = "folder-card";
        folder.innerHTML = `
            <div class="folder-header" onclick="toggleFolder(${index}, event)">
                <div class="folder-top">
                    <div class="folder-name">📁 ${category}</div>
                    <div class="folder-count">${folders[category].length}</div>
                </div>
            </div>
            <div class="file-list" id="folder-${index}">
                ${folders[category].map(file => `
                    <div class="file-item" onclick="openFile('${file}', event)">
                        <div class="file-title">${file.replace(".html","")}</div>
                    </div>
                `).join("")}
            </div>
        `;
        folderGrid.appendChild(folder);
    });
}

/*
====================================================
TOGGLE TARGETED FOLDER ONLY
====================================================
*/
function toggleFolder(index, event){
    if(event) event.stopPropagation();
    
    const targetFolder = document.getElementById(`folder-${index}`);
    const allFolders = document.querySelectorAll(".file-list");

    // Close all folders except the selected one
    allFolders.forEach(folder => {
        if(folder !== targetFolder){
            folder.classList.remove("active");
        }
    });

    // Toggle selected folder
    targetFolder.classList.toggle("active");
}

/*
====================================================
NAVIGATION
====================================================
*/
function openFile(file, event){
    if(event) event.stopPropagation();
    
    showLoader();

    // Small delay to ensure loader visual displays before navigation redirects
    setTimeout(() => {
        window.location.href = file;
    }, 200);
}

// Initialize Application
loadFiles();
</script>
</body>
</html>

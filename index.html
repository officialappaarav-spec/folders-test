<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Banking Mains</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    padding:20px;
}

/* HEADER */

.header{
    text-align:center;
    margin-bottom:35px;
}

.header h1{
    font-size:42px;
    background:linear-gradient(90deg,#60a5fa,#8b5cf6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.header p{
    color:#94a3b8;
    margin-top:10px;
}

/* FOLDER GRID */

.folder-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

/* FOLDER CARD */

.folder-card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:22px;
    overflow:hidden;
    transition:0.3s;
}

.folder-card:hover{
    border-color:#6366f1;
    transform:translateY(-5px);
}

/* FOLDER HEADER */

.folder-header{
    padding:22px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.03);
}

.folder-name{
    font-size:22px;
    font-weight:bold;
}

.folder-count{
    background:#6366f1;
    padding:6px 12px;
    border-radius:20px;
    font-size:14px;
}

/* FILE LIST */

.file-list{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.5s ease;
}

.file-list.active{
    max-height:2000px;
}

/* FILE ITEM */

.file-item{
    padding:18px 22px;
    border-top:1px solid rgba(255,255,255,0.05);
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    transition:0.3s;
}

.file-item:hover{
    background:rgba(99,102,241,0.15);
}

.file-title{
    font-size:17px;
}

.open-btn{
    background:#6366f1;
    padding:8px 14px;
    border-radius:10px;
    font-size:13px;
}

/* LOADER */

.loader-overlay{
    position:fixed;
    inset:0;
    background:#0f172a;
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.loader-overlay.active{
    display:flex;
}

.loader{
    width:75px;
    height:75px;
    border:7px solid rgba(255,255,255,0.1);
    border-top:7px solid #6366f1;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

/* EMPTY */

.empty{
    text-align:center;
    color:#94a3b8;
    margin-top:50px;
    font-size:20px;
}

/* MOBILE */

@media(max-width:600px){

    .header h1{
        font-size:30px;
    }

    .folder-name{
        font-size:18px;
    }

}

</style>
</head>

<body>

<div class="header">
    <h1>Banking Mains</h1>
    <p>Practice Sets Collection</p>
</div>

<div class="folder-grid" id="folderGrid"></div>

<!-- LOADER -->

<div class="loader-overlay" id="loader">
    <div class="loader"></div>
</div>

<script>

/*
====================================================
CHANGE THESE
====================================================
*/

const username = "YOUR_GITHUB_USERNAME";
const repo = "YOUR_REPOSITORY_NAME";

/*
====================================================
GET CATEGORY NAME
====================================================

Puzzle 1.html -> Puzzle
Puzzle 20.html -> Puzzle
Seating Arrangement 3.html -> Seating Arrangement

====================================================
*/

function getCategory(fileName){

    return fileName
        .replace(/\s\d+\.html$/i,"")
        .trim();

}

/*
====================================================
GET FILE NUMBER
====================================================
*/

function getNumber(fileName){

    const match = fileName.match(/(\d+)(?=\.html)/i);

    return match ? parseInt(match[1]) : 0;

}

/*
====================================================
FETCH FILES FROM GITHUB
====================================================
*/

async function loadFiles(){

    try{

        const response = await fetch(
            `https://api.github.com/repos/${username}/${repo}/contents/`
        );

        const data = await response.json();

        // ONLY HTML FILES
        const files = data
            .filter(file =>
                file.name.endsWith(".html")
                &&
                file.name.toLowerCase() !== "index.html"
            )
            .map(file => file.name);

        createFolders(files);

    }catch(error){

        console.error(error);

        document.getElementById("folderGrid").innerHTML = `
            <div class="empty">
                Failed To Load Files
            </div>
        `;

    }

}

/*
====================================================
CREATE FOLDERS AUTOMATICALLY
====================================================
*/

function createFolders(files){

    const folders = {};

    // CREATE GROUPS

    files.forEach(file => {

        const category = getCategory(file);

        if(!folders[category]){
            folders[category] = [];
        }

        folders[category].push(file);

    });

    // SORT DESCENDING

    Object.keys(folders).forEach(category => {

        folders[category].sort((a,b)=>{

            return getNumber(b) - getNumber(a);

        });

    });

    renderFolders(folders);

}

/*
====================================================
RENDER FOLDERS
====================================================
*/

function renderFolders(folders){

    const folderGrid = document.getElementById("folderGrid");

    folderGrid.innerHTML = "";

    Object.keys(folders).forEach((category,index)=>{

        const folder = document.createElement("div");
        folder.className = "folder-card";

        folder.innerHTML = `

            <div class="folder-header" onclick="toggleFolder(${index})">

                <div class="folder-name">
                    📁 ${category}
                </div>

                <div class="folder-count">
                    ${folders[category].length}
                </div>

            </div>

            <div class="file-list" id="folder-${index}">

                ${folders[category].map(file => `

                    <div class="file-item" onclick="openFile('${file}')">

                        <div class="file-title">
                            ${file.replace(".html","")}
                        </div>

                        <div class="open-btn">
                            Open
                        </div>

                    </div>

                `).join("")}

            </div>

        `;

        folderGrid.appendChild(folder);

    });

}

/*
====================================================
TOGGLE FOLDER
====================================================
*/

function toggleFolder(index){

    const folder = document.getElementById(`folder-${index}`);

    folder.classList.toggle("active");

}

/*
====================================================
OPEN FILE
====================================================
*/

const loader = document.getElementById("loader");

function openFile(file){

    loader.classList.add("active");

    // OPEN FILE
    window.location.href = file;

}

/*
====================================================
START
====================================================
*/

loadFiles();

</script>

</body>
</html>

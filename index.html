<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banking Mains</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:15px;
    min-height:100vh;
}

/* HEADER */

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    font-size:34px;
    background:linear-gradient(90deg,#60a5fa,#8b5cf6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.header p{
    color:#94a3b8;
    margin-top:8px;
    font-size:14px;
}

/* FOLDER GRID */

.folder-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:15px;
}

/* FOLDER CARD */

.folder-card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    overflow:hidden;
    transition:0.3s;
    backdrop-filter:blur(8px);
}

.folder-card:hover{
    border-color:#6366f1;
    transform:translateY(-4px);
}

/* HEADER */

.folder-header{
    padding:18px;
    cursor:pointer;
}

.folder-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.folder-name{
    font-size:17px;
    font-weight:bold;
    line-height:1.4;
    word-break:break-word;
}

.folder-count{
    background:#6366f1;
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
    flex-shrink:0;
}

/* FILES */

.file-list{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.4s ease;
}

.file-list.active{
    max-height:2500px;
}

/* FILE */

.file-item{
    padding:14px 18px;
    border-top:1px solid rgba(255,255,255,0.06);
    cursor:pointer;
    transition:0.3s;
}

.file-item:hover{
    background:rgba(99,102,241,0.15);
}

.file-title{
    font-size:14px;
    line-height:1.5;
}

/* LOADER */

.loader-overlay{
    position:fixed;
    inset:0;
    background:#0f172a;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:99999;
    transition:0.3s;
}

.loader-overlay.hide{
    opacity:0;
    pointer-events:none;
}

.loader{
    width:70px;
    height:70px;
    border:7px solid rgba(255,255,255,0.1);
    border-top:7px solid #6366f1;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

/* EMPTY */

.empty{
    text-align:center;
    color:#94a3b8;
    margin-top:50px;
    font-size:18px;
}

/* MOBILE */

@media(max-width:600px){

    .folder-grid{
        grid-template-columns:repeat(2,1fr);
    }

    .folder-name{
        font-size:15px;
    }

    .header h1{
        font-size:28px;
    }

}

</style>
</head>

<body>

<!-- LOADER -->

<div class="loader-overlay" id="loader">
    <div class="loader"></div>
</div>

<!-- HEADER -->

<div class="header">
    <h1>Banking Mains</h1>
    <p>Practice Sets Collection</p>
</div>

<!-- FOLDERS -->

<div class="folder-grid" id="folderGrid"></div>

<script>

/*
====================================================
ADD YOUR DETAILS
====================================================
*/

const username = "YOUR_GITHUB_USERNAME";
const repo = "YOUR_REPOSITORY_NAME";

/*
====================================================
REMOVE LOADER AFTER PAGE LOAD
====================================================
*/

window.addEventListener("load",()=>{

    setTimeout(()=>{

        document.getElementById("loader").classList.add("hide");

    },500);

});

/*
====================================================
CATEGORY NAME
====================================================
*/

function getCategory(fileName){

    return fileName
        .replace(/\s\d+\.html$/i,"")
        .trim();

}

/*
====================================================
NUMBER
====================================================
*/

function getNumber(fileName){

    const match = fileName.match(/(\d+)(?=\.html)/i);

    return match ? parseInt(match[1]) : 0;

}

/*
====================================================
LOAD FILES
====================================================
*/

async function loadFiles(){

    try{

        const response = await fetch(
            `https://api.github.com/repos/${username}/${repo}/contents/`
        );

        const data = await response.json();

        const files = data
            .filter(file =>

                file.name.endsWith(".html")
                &&
                file.name.toLowerCase() !== "index.html"

            )
            .map(file => file.name);

        createFolders(files);

    }catch(error){

        console.error(error);

        document.getElementById("folderGrid").innerHTML = `
            <div class="empty">
                Failed To Load Files
            </div>
        `;

    }

}

/*
====================================================
CREATE FOLDERS
====================================================
*/

function createFolders(files){

    const folders = {};

    files.forEach(file=>{

        const category = getCategory(file);

        if(!folders[category]){
            folders[category] = [];
        }

        folders[category].push(file);

    });

    // SORT DESCENDING

    Object.keys(folders).forEach(category=>{

        folders[category].sort((a,b)=>{

            return getNumber(b) - getNumber(a);

        });

    });

    renderFolders(folders);

}

/*
====================================================
RENDER
====================================================
*/

function renderFolders(folders){

    const folderGrid = document.getElementById("folderGrid");

    folderGrid.innerHTML = "";

    Object.keys(folders).forEach((category,index)=>{

        const folder = document.createElement("div");

        folder.className = "folder-card";

        folder.innerHTML = `

            <div class="folder-header" onclick="toggleFolder(${index})">

                <div class="folder-top">

                    <div class="folder-name">
                        📁 ${category}
                    </div>

                    <div class="folder-count">
                        ${folders[category].length}
                    </div>

                </div>

            </div>

            <div class="file-list" id="folder-${index}">

                ${folders[category].map(file => `

                    <div class="file-item"
                        onclick="openFile('${file}')">

                        <div class="file-title">
                            ${file.replace(".html","")}
                        </div>

                    </div>

                `).join("")}

            </div>

        `;

        folderGrid.appendChild(folder);

    });

}

/*
====================================================
TOGGLE SINGLE FOLDER ONLY
====================================================
*/

function toggleFolder(index){

    const targetFolder =
        document.getElementById(`folder-${index}`);

    const allFolders =
        document.querySelectorAll(".file-list");

    // CLOSE ALL FIRST

    allFolders.forEach(folder=>{

        if(folder !== targetFolder){

            folder.classList.remove("active");

        }

    });

    // OPEN CURRENT

    targetFolder.classList.toggle("active");

}

/*
====================================================
OPEN FILE
====================================================
*/

function openFile(file){

    // SHOW LOADER

    document.getElementById("loader")
        .classList.remove("hide");

    // OPEN FILE

    setTimeout(()=>{

        window.location.href = file;

    },300);

}

/*
====================================================
START
====================================================
*/

loadFiles();

</script>

</body>
</html>

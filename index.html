<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banking Mains</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    padding:20px;
}

/* HEADER */

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:42px;
    background:linear-gradient(90deg,#60a5fa,#8b5cf6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.header p{
    color:#94a3b8;
    margin-top:10px;
}

/* SEARCH */

.search-box{
    max-width:700px;
    margin:0 auto 35px;
}

.search-box input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#1e293b;
    color:white;
    font-size:16px;
    outline:none;
}

/* CATEGORY */

.category{
    margin-bottom:35px;
}

.category-title{
    font-size:26px;
    margin-bottom:18px;
    padding-left:14px;
    border-left:5px solid #6366f1;
    color:#f8fafc;
}

/* FILE GRID */

.file-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:18px;
}

.file-card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    padding:20px;
    cursor:pointer;
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

.file-card:hover{
    transform:translateY(-6px);
    border-color:#6366f1;
    background:rgba(99,102,241,0.15);
}

.file-name{
    font-size:18px;
    font-weight:bold;
    line-height:1.5;
    margin-bottom:12px;
}

.open-btn{
    display:inline-block;
    padding:10px 15px;
    background:#6366f1;
    border-radius:10px;
    font-size:14px;
}

/* LOADER */

.loader-overlay{
    position:fixed;
    inset:0;
    background:rgba(15,23,42,0.85);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
}

.loader-overlay.active{
    opacity:1;
    pointer-events:auto;
}

.loader{
    width:80px;
    height:80px;
    border:8px solid rgba(255,255,255,0.15);
    border-top:8px solid #6366f1;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.empty{
    text-align:center;
    color:#94a3b8;
    margin-top:40px;
    font-size:20px;
}

@media(max-width:600px){

    .header h1{
        font-size:30px;
    }

    .category-title{
        font-size:22px;
    }

}

</style>
</head>
<body>

<div class="header">
    <h1>Banking Mains</h1>
    <p>Automatically Detecting Files From GitHub Repo</p>
</div>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search files or folders...">
</div>

<div id="content"></div>

<!-- LOADER -->
<div class="loader-overlay" id="loader">
    <div class="loader"></div>
</div>

<script>

/*
====================================================
IMPORTANT
====================================================

CHANGE THESE 2 VALUES

username = your github username
repo = your github repository name

====================================================
*/

const username = "YOUR_GITHUB_USERNAME";
const repo = "YOUR_REPOSITORY_NAME";

/*
====================================================
FETCH FILES FROM GITHUB
====================================================
*/

async function fetchFiles(){

    try{

        const response = await fetch(
            `https://api.github.com/repos/${username}/${repo}/contents/`
        );

        const data = await response.json();

        // ONLY HTML FILES EXCEPT INDEX.HTML
        const htmlFiles = data
            .filter(file =>
                file.name.endsWith(".html")
                &&
                file.name.toLowerCase() !== "index.html"
            )
            .map(file => file.name);

        renderFiles(htmlFiles);

    }catch(error){

        console.error(error);

        document.getElementById("content").innerHTML = `
            <div class="empty">
                Failed To Load Files
            </div>
        `;
    }

}

/*
====================================================
CATEGORY LOGIC
====================================================
*/

function getCategory(fileName){

    // Remove number + .html
    return fileName
        .replace(/\d+\.html$/i,"")
        .trim();

}

function getNumber(fileName){

    const match = fileName.match(/(\d+)(?=\.html)/);

    return match ? parseInt(match[1]) : 0;

}

/*
====================================================
GROUP FILES
====================================================
*/

function groupFiles(files){

    const folders = {};

    files.forEach(file => {

        const category = getCategory(file);

        if(!folders[category]){
            folders[category] = [];
        }

        folders[category].push(file);

    });

    // SORT LARGE NUMBER FIRST
    Object.keys(folders).forEach(category => {

        folders[category].sort((a,b)=>{

            return getNumber(b) - getNumber(a);

        });

    });

    return folders;

}

/*
====================================================
RENDER
====================================================
*/

const content = document.getElementById("content");
const searchInput = document.getElementById("searchInput");

function renderFiles(files, search=""){

    const folders = groupFiles(files);

    content.innerHTML = "";

    let found = false;

    Object.keys(folders).forEach(category => {

        const filteredFiles = folders[category].filter(file =>

            file.toLowerCase().includes(search.toLowerCase())
            ||
            category.toLowerCase().includes(search.toLowerCase())

        );

        if(filteredFiles.length === 0) return;

        found = true;

        const section = document.createElement("div");
        section.className = "category";

        section.innerHTML = `

            <div class="category-title">
                ${category}
            </div>

            <div class="file-grid">

                ${filteredFiles.map(file => `

                    <div class="file-card" onclick="openFile('${file}')">

                        <div class="file-name">
                            ${file.replace(".html","")}
                        </div>

                        <div class="open-btn">
                            Open File
                        </div>

                    </div>

                `).join("")}

            </div>

        `;

        content.appendChild(section);

    });

    if(!found){

        content.innerHTML = `
            <div class="empty">
                No Files Found
            </div>
        `;

    }

}

/*
====================================================
SEARCH
====================================================
*/

let allFiles = [];

searchInput.addEventListener("input",(e)=>{

    renderFiles(allFiles, e.target.value);

});

/*
====================================================
OPEN FILE WITH LOADER
====================================================
*/

const loader = document.getElementById("loader");

function openFile(file){

    loader.classList.add("active");

    setTimeout(()=>{

        window.location.href = file;

    },500);

}

/*
====================================================
START
====================================================
*/

async function start(){

    try{

        const response = await fetch(
            `https://api.github.com/repos/${username}/${repo}/contents/`
        );

        const data = await response.json();

        allFiles = data
            .filter(file =>
                file.name.endsWith(".html")
                &&
                file.name.toLowerCase() !== "index.html"
            )
            .map(file => file.name);

        renderFiles(allFiles);

    }catch(error){

        console.error(error);

        content.innerHTML = `
            <div class="empty">
                Error Loading Files
            </div>
        `;
    }

}

start();

</script>

</body>
</html>
